openapi: 3.0.0
info:
  title: laravel-usecase-example api
  description: laravel-usecase-example api
  version: 1.0.0
servers:
  - url: http://localhost:8080

components:
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer
      bearerFormat: token

paths:
  /api/orders:
    post:
      summary: Create a new order
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required:
                      - id
                      - qty
                    properties:
                      id:
                        type: integer
                        example: 10
                      qty:
                        type: integer
                        example: 2
      responses:
        '200':
          description: Order created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      order_id:
                        type: integer
                        example: 1
                      status:
                        type: string
                        enum: [pending, completed, rejected]
                        example: pending
